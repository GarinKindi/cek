// FUNGSI UPLOAD GAMBAR KE SUPABASE STORAGE
// Menggunakan standar murni ke Bucket (Mencegah Base64 Text di DB)
// ==============================================
const handleImageUploadModern = async (event, callback, showToastFn) => {
    const file = event.target.files[0];
    if (!file) return;

    // Cek ukuran file (maksimal 2MB)
    if (file.size > 2 * 1024 * 1024) {
        const errorMsg = '❌ Ukuran gambar terlalu besar! Maksimal 2MB.';
        if (showToastFn) showToastFn(errorMsg, 'error'); else alert(errorMsg);
        event.target.value = '';
        return;
    }

    if (showToastFn) showToastFn('📤 Mengunggah gambar ke server...', 'info');

    try {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
        const filePath = `public/${fileName}`;

        // Mencoba upload ke Storage 'website-images' secara eksklusif
        const { data, error } = await supabase.storage
            .from('website-images')
            .upload(filePath, file, { cacheControl: '3600', upsert: false });

        if (error) throw error; // Lempar error langsung, tidak ada lagi fallback Base64!

        // Ambil URL Publik
        const { data: { publicUrl } } = supabase.storage
            .from('website-images')
            .getPublicUrl(filePath);

        callback(publicUrl);
        if (showToastFn) showToastFn('✅ Upload gambar berhasil!', 'success');
        
    } catch (error) {
        console.error('❌ Storage upload gagal:', error.message);
        const errorMsg = `Gagal upload: ${error.message}. Pastikan bucket 'website-images' sudah ada dan disetel ke Publik.`;
        if (showToastFn) showToastFn(errorMsg, 'error'); else alert(errorMsg);
    }
    
    event.target.value = ''; // Reset input
};

// ==============================================
// OPTIMASI PERFORMA: Lazy Loading Image Component
// ==============================================
function LazyImage({ src, alt, className = "", imgClassName = "object-cover object-center" }) {
    const [loaded, setLoaded] = useState(false);
    const imgRef = useRef();
    
    useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = imgRef.current;
                    if (img) {
                        img.src = src;
                        img.onload = () => setLoaded(true);
                    }
                    observer.disconnect();
                }
            });
        }, { rootMargin: '100px' }); // Unduh gambar 100px sebelum masuk ke dalam layar
        
        if (imgRef.current) observer.observe(imgRef.current);
        return () => observer.disconnect();
    }, [src]);
    
    return (
        <div className={`relative overflow-hidden bg-stone-100 ${className}`}>
            {!loaded && <div className="absolute inset-0 animate-pulse w-full h-full bg-stone-200"></div>}
            <img 
                ref={imgRef} 
                alt={alt} 
                className={`${loaded ? 'opacity-100' : 'opacity-0'} transition-opacity duration-500 w-full h-full ${imgClassName}`} 
            />
        </div>
    );
}

const ImageSlider = ({ images, heightClass = "h-64 md:h-72", priceOverlay, titleAlt="Paket Wisata Jogja" }) => {
    const [currentIndex, setCurrentIndex] = useState(0);
    const validImages = Array.isArray(images) && images.length > 0 
        ? images.filter(img => img && typeof img === 'string') 
        : ['https://images.unsplash.com/photo-1542601906990-b4d3fb778b09'];

    useEffect(() => {
        if(validImages.length <= 1) return;
        const timer = setInterval(() => setCurrentIndex(prev => (prev === validImages.length - 1 ? 0 : prev + 1)), 3500);

    }, [validImages]);

    return (
        <div className={`relative ${heightClass} w-full overflow-hidden group rounded-t-3xl`}>
            {validImages.map((img, idx) => (
                <LazyImage 
                    key={idx} 
                    src={img}

                    className={`absolute inset-0 w-full h-full transition-opacity duration-700 ease-in-out ${idx === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}

// 6. KOMPONEN LOGIN ADMIN (SUPABASE AUTH - JWT)
// ==============================================
function LoginAdmin({ setGlobalRoute }) {
    const [email, setEmail] = useState('');
    const [pass, setPass] = useState('');
    const [status, setStatus] = useState({ type: '', msg: '' });
    const [loading, setLoading] = useState(false);

    // Cek sesi yang sah langsung dari server Supabase
    useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) setGlobalRoute('admin');
        });
    }, [setGlobalRoute]);

    const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setStatus({ type: '', msg: '' });

        try {
            // Melakukan login menggunakan Supabase Authentication (Bukan tabel buatan manual)
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: pass,
            });

            if (error) throw error;

            if (data.session) {
                setStatus({ type: 'success', msg: 'Login berhasil! Memuat dashboard...' });
                setTimeout(() => setGlobalRoute('admin'), 1000);
            }
        } catch (err) {
            setStatus({ type: 'error', msg: err.message || 'Login gagal. Periksa kembali email dan password Anda.' });
            console.error("Login Error:", err);
        } finally {
            setLoading(false);
        }
    };

    return (
        <div className="min-h-screen bg-gradient-to-br from-emerald-900 via-emerald-800 to-stone-900 flex flex-col items-center justify-center p-4 relative">
            <button type="button" onClick={() => setGlobalRoute('public')} className="absolute top-6 left-6 text-white hover:text-emerald-200 flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full backdrop-blur-md transition">
                <i className="fas fa-arrow-left"></i> Kembali ke Web
            </button>

            <div className="max-w-md w-full bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden fade-in mt-16 md:mt-0">
                <div className="bg-emerald-600 p-6 text-center">
                    <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3"><i className="fas fa-leaf text-white text-3xl"></i></div>
                    <h2 className="text-2xl font-bold text-white">Admin Dashboard</h2>
                </div>
                <div className="p-8">
                    {status.msg && (
                        <div className={`mb-4 p-3 rounded-xl text-sm flex items-center gap-2 ${status.type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'}`}>
                            <i className={`fas ${status.type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}`}></i> {status.msg}
                        </div>
                    )}
                    <form onSubmit={handleLogin} className="space-y-5">
                        <div>
                            <label className="block text-sm font-bold text-stone-700 mb-2"><i className="fas fa-envelope text-emerald-600 mr-2"></i> Email Admin</label>
                            <input type="email" required value={email} onChange={(e)=>setEmail(e.target.value)} className="w-full border border-stone-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="admin@kampungberseri.com" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-stone-700 mb-2"><i className="fas fa-lock text-emerald-600 mr-2"></i> Password</label>

function AdminDashboard({ setGlobalRoute, data, refreshData, dbError }) {
    const [menu, setMenu] = useState('overview');
    const [toast, setToast] = useState(null);
    const [isSaving, setIsSaving] = useState(false);
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

    // Proteksi Route menggunakan sesi Supabase
    useEffect(() => {
        const checkAuth = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                setGlobalRoute('login');
            }
        };
        checkAuth();
        
        const interval = setInterval(checkAuth, 5 * 60 * 1000); // Cek sesi tiap 5 menit
        return () => clearInterval(interval);
    }, [setGlobalRoute]);
    
    const hero = data?.hero || fallbackHero;
    const paket = data?.paket || [];
    const edukasi = data?.edukasi || [];
    const kemitraan = data?.kemitraan || [];
    const galeri = data?.galeri || [];
    const olehOleh = data?.olehOleh || [];

    const [previewHeroImg, setPreviewHeroImg] = useState(hero.image || '');
    useEffect(() => {
        setPreviewHeroImg(hero.image || '');
    }, [hero.image]);

    const showToast = (msg, type='success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 4000);
    };

    const handleLogout = async () => {
        await supabase.auth.signOut();
        setGlobalRoute('public'); 
        setTimeout(() => window.location.reload(), 100);
    };

    const wrapSave = async (apiCall, section) => {
        if(isSaving) return;
        setIsSaving(true);
        try {
            await apiCall();
            showToast(`Data ${section} berhasil diperbarui!`);
            await refreshData(); 
        } catch (err) {
            showToast(`Gagal: ${err.message}`, 'error');
        } finally {
            setIsSaving(false);
        }
    };

    // FUNGSI UNTUK MENYIMPAN ARRAY / LIST (Row-by-Row Update Aman)
    const handleSaveList = async (table, items) => {
        if(isSaving) return;
        setIsSaving(true);
        try {
            if (table === 'galeri') {
                // ROW-BY-ROW Galeri (Hindari delete massal)
                const currentData = await supabase.from('galeri').select('id, image_url');
                const currentItems = currentData.data || [];
                const newUrls = items; 

                // Hapus yang tidak ada di list baru
                for (const old of currentItems) {
                    if (!newUrls.includes(old.image_url)) {
                        await supabase.from('galeri').delete().eq('id', old.id);
                    }
                }

                // Tambah yang belum ada
                for (const url of newUrls) {
                    const exists = currentItems.some(old => old.image_url === url);
                    if (!exists) {
                        const { error } = await supabase.from('galeri').insert({ image_url: url });
                        if (error) {
                            if (error.code === '42501') throw new Error(`Akses Ditolak (RLS Aktif). Jalankan SQL: ALTER TABLE galeri DISABLE ROW LEVEL SECURITY;`);
                            throw error;
                        }
                    }
                }
            } else {
                // ROW-BY-ROW Tabel Lain
                const currentData = await supabase.from(table).select('id');
                const currentIds = currentData.data ? currentData.data.map(d => d.id) : [];
                const newIdsToKeep = [];

                for (const item of items) {
                    const { id, rawActivities, rawDetails, ...copy } = item;
                    
                    if (copy.desc !== undefined) {
                        copy.description = copy.desc;
                        delete copy.desc;
                    }

                    if (table === 'paket') {
                        copy.activities = (rawActivities || '').split('\n').map(s => s.trim()).filter(Boolean);
                    }
                    if (table === 'edukasi') {
                        copy.details = (rawDetails || '').split('\n').filter(l => l.includes(':')).map(l => {
                            const [label, ...rest] = l.split(':');
                            return { label: label.trim(), value: rest.join(':').trim() };
                        });
                    }

                    if (id && id.toString().startsWith('new-')) {
                        const { error } = await supabase.from(table).insert(copy);
                        if (error) {
                            if (error.code === '42501') throw new Error(`Akses Ditolak (RLS Aktif). Jalankan SQL: ALTER TABLE ${table} DISABLE ROW LEVEL SECURITY;`);
                            throw error;
                        }
                    } else if (id) {
                        newIdsToKeep.push(id);
                        const { error } = await supabase.from(table).update(copy).eq('id', id);
                        if (error) {
                            if (error.code === '42501') throw new Error(`Akses Ditolak (RLS Aktif). Jalankan SQL: ALTER TABLE ${table} DISABLE ROW LEVEL SECURITY;`);
                            throw error;
                        }
                    }
                }

                // Hapus baris lama yang dihilangkan oleh Admin
                const idsToDelete = currentIds.filter(dbId => !newIdsToKeep.includes(dbId));
                for (const delId of idsToDelete) {
                    const { error } = await supabase.from(table).delete().eq('id', delId);
                    if (error) throw error;
                }
            }
            
            showToast(`Data ${table} berhasil disimpan!`);
            await refreshData(); 
        } catch (err) {
            showToast(`Gagal menyimpan ${table}: ` + err.message, 'error');
            console.error(err);
        } finally {
            setIsSaving(false);
        }
    };

    return (
        <div className="flex h-screen bg-stone-100 fade-in overflow-hidden relative">
            {toast && (
                <div className={`fixed top-4 right-4 z-[9999] px-6 py-4 rounded-xl text-white font-bold shadow-2xl transition-all flex items-center gap-3 ${toast.type === 'error' ? 'bg-red-500' : 'bg-emerald-600'}`}>
                    <i className={`fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} text-2xl`}></i>
                    {toast.msg}
                </div>
            )}
            {isSaving && (
                <div className="fixed inset-0 z-[9998] bg-stone-900/50 backdrop-blur-sm flex flex-col items-center justify-center text-white font-bold">
                    <i className="fas fa-spinner fa-spin text-5xl mb-4"></i> Menyimpan Perubahan...
                </div>
            )}
            
            {isMobileMenuOpen && (
                <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>
            )}

            <div className={`w-64 bg-stone-900 text-stone-300 flex flex-col fixed md:static inset-y-0 left-0 z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 ease-in-out`}>
                <div className="p-6 border-b border-stone-800 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <i className="fas fa-leaf text-emerald-500 text-2xl"></i>
                        <div><h1 className="font-bold text-white">Admin CMS</h1><p className="text-xs text-emerald-500">Kampung Berseri</p></div>
                    </div>
                    <button className="md:hidden text-white" onClick={() => setIsMobileMenuOpen(false)}><i className="fas fa-times text-xl"></i></button>
                </div>
                
                <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                    {[
                        { id: 'overview', icon: 'chart-pie', label: 'Ringkasan' },
                        { id: 'hero', icon: 'home', label: 'Tampilan Beranda' },
                        { id: 'paket', icon: 'box', label: 'Paket Wisata' },
                        { id: 'edukasi', icon: 'book-open', label: 'Edukasi' },
                        { id: 'oleholeh', icon: 'gift', label: 'Oleh-Oleh' },
                        { id: 'kemitraan', icon: 'building', label: 'Mitra' },
                        { id: 'galeri', icon: 'images', label: 'Galeri' }
                    ].map(btn => (
                        <button type="button" key={btn.id} onClick={() => { setMenu(btn.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${menu === btn.id ? 'bg-emerald-600 text-white shadow-md' : 'hover:bg-stone-800'}`}>
                            <div className="w-5 text-center"><i className={`fas fa-${btn.icon}`}></i></div> {btn.label}

                            </div>
                            
                            <div className="mt-8 p-5 bg-emerald-50 rounded-2xl border border-emerald-200 flex items-start gap-4 shadow-sm">
                                <div className="w-10 h-10 bg-emerald-100 rounded-full flex justify-center items-center flex-shrink-0 text-emerald-600 text-xl hidden sm:flex"><i className="fas fa-check-circle"></i></div>
                                <div>
                                    <h4 className="font-bold text-emerald-800 text-base md:text-lg">Sudah Selesai?</h4>
                                    <p className="text-emerald-700 pt-0 sm:pt-1 font-medium text-sm md:text-base">Perubahan akan langsung terlihat di website publik setelah disimpan.</p>
                                </div>
                            </div>
                            
                            <button type="button" disabled={isSaving} onClick={(e) => {
                                e.preventDefault();
                                const newHero = {
                                    id: 1, 
                                    tagline: document.getElementById('h-tagline').value,
                                    title_main: document.getElementById('h-title').value, 
                                    title_highlight: document.getElementById('h-title-highlight').value,
                                    description: document.getElementById('h-desc').value,
                                    image: previewHeroImg 
                                };
                                wrapSave(async () => { 
                                    const { error } = await supabase.from('hero').upsert(newHero); 
                                    if (error) {
                                        if (error.code === '42501') throw new Error('Akses Ditolak (RLS Aktif). Jalankan SQL ini di Supabase: ALTER TABLE hero DISABLE ROW LEVEL SECURITY;');
                                        throw error;
                                    }
                                }, 'Halaman Utama');
                            }} className="w-full mt-6 bg-emerald-600 text-white px-6 py-4 rounded-2xl font-extrabold hover:bg-emerald-700 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 text-base md:text-lg flex justify-center items-center gap-3">
                                {isSaving ? <i className="fas fa-spinner fa-spin text-xl"></i> : <i className="fas fa-save text-xl md:text-2xl"></i>} SIMPAN TAMPILAN UTAMA
                            </button>
                        </div>
                    )}

                    {menu === 'paket' && <ManagePaket data={paket} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'edukasi' && <ManageEdukasi data={edukasi} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'oleholeh' && <ManageOlehOleh data={olehOleh} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'kemitraan' && <ManageKemitraan data={kemitraan} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'galeri' && <ManageGaleri data={galeri} onSave={handleSaveList} showToast={showToast} />}
                </div>
            </div>
        </div>
    );
}

// ==============================================
// 9. ROOT ROUTER (PENGENDALI UTAMA)
// ==============================================
function App() {
    const [globalRoute, setGlobalRoute] = useState('public');
    const [loading, setLoading] = useState(true);
    const [dbError, setDbError] = useState(false); 
    const [data, setData] = useState({ hero: {}, paket: [], edukasi: [], kemitraan: [], galeri: [], olehOleh: [] });

    const loadAllData = async () => {
        setLoading(true);
        setDbError(false);
        try {
            const [resHero, resPaket, resEdukasi, resMitra, resGaleri, resOlehOleh] = await Promise.all([
                supabase.from('hero').select('*').eq('id', 1).maybeSingle(),
                supabase.from('paket').select('*').order('id', { ascending: true }),
                supabase.from('edukasi').select('*').order('id', { ascending: true }),
                supabase.from('kemitraan').select('*').order('id', { ascending: true }),
                supabase.from('galeri').select('*').order('id', { ascending: false }),
                supabase.from('oleholeh').select('*').order('id', { ascending: true })
            ]);

            if (resHero.error || resPaket.error || resEdukasi.error || resMitra.error || resGaleri.error || resOlehOleh.error) {
                console.error("Kesalahan Database Ditemukan:", resHero.error || resPaket.error || resEdukasi.error);
                setDbError(true);
                setData({ hero: fallbackHero, paket: fallbackPaket, edukasi: fallbackEdukasi, kemitraan: fallbackMitra, galeri: fallbackGaleri, olehOleh: fallbackOlehOleh });
            } else {
                setData({
                    hero: resHero.data || fallbackHero,
                    paket: resPaket.data || [],
                    edukasi: resEdukasi.data || [],
                    kemitraan: resMitra.data || [],
                    galeri: resGaleri.data ? resGaleri.data.map(i => i.image_url) : [],
                    olehOleh: resOlehOleh.data || []
                });
            }
        } catch (error) {
            console.error("Gagal total memuat data Supabase:", error);
            setDbError(true);
            setData({ hero: fallbackHero, paket: fallbackPaket, edukasi: fallbackEdukasi, kemitraan: fallbackMitra, galeri: fallbackGaleri, olehOleh: fallbackOlehOleh });
        } finally {
            setLoading(false);
        }
    };

    const handleRouteChange = (route) => {
        setGlobalRoute(route);
        if (route === 'public') window.scrollTo(0, 0);
    };

    useEffect(() => {
        const checkSession = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) setGlobalRoute('admin'); 
        };
        checkSession();
        loadAllData();
    }, []);

    if (loading) return (
        <div className="min-h-screen bg-stone-50 flex flex-col items-center justify-center p-4">
            <div className="w-16 h-16 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mb-4 shadow-lg"></div>
            <p className="text-stone-600 font-bold text-center animate-pulse">Memuat data Kampung Berseri...</p>
        </div>
    );

    return (
        <React.Fragment>
            {globalRoute === 'public' && <PublicWebsite data={data} setGlobalRoute={handleRouteChange} />}
            {globalRoute === 'login'  && <LoginAdmin setGlobalRoute={handleRouteChange} />}
            {globalRoute === 'admin'  && <AdminDashboard data={data} setGlobalRoute={handleRouteChange} refreshData={loadAllData} dbError={dbError} />}
        </React.Fragment>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
