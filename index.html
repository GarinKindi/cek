<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampung Berseri - Web & Admin Terintegrasi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #f5f5f4;}
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #047857; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ==============================================
// 1. KONFIGURASI SUPABASE
// ==============================================
const SUPABASE_URL = 'https://yiesgjzblaneltyuiazb.supabase.co';  
const SUPABASE_ANON_KEY = 'sb_publishable_VV0HrXGLNlGa9GQGXSrWXA_X1qLdoUf';  
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==============================================
// FUNGSI GLOBAL UPLOAD GAMBAR DARI PERANGKAT
// ==============================================
const handleImageUpload = (event, callback, showToastFn) => {
    const file = event.target.files[0];
    if (file) {
        // Batas maksimal 2MB agar database tidak berat
        if (file.size > 2 * 1024 * 1024) { 
            if(showToastFn) showToastFn('Gagal: Ukuran gambar terlalu besar! Maksimal 2MB.', 'error');
            else alert('Gagal: Ukuran gambar maksimal 2MB!');
            event.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onloadend = () => callback(reader.result);
        reader.readAsDataURL(file);
    }
};

// ==============================================
// 2. DATA FALLBACK KAYA FITUR (Hanya dipanggil saat API gagal total)
// ==============================================
const fallbackHero = {
    tagline: 'Destinasi Wisata Ramah Lingkungan',
    title_main: 'Wisata Edukasi',
    title_highlight: 'Kampung Berseri',
    description: 'Belajar langsung tentang pertanian organik, peternakan berkelanjutan, dan budaya pedesaan dari kearifan masyarakat lokal.',
    image: 'https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&q=80&w=2000'
};

const olehOlehDataStatic = [
    { id: 'oo-1', paket_id: 'Edukasi', wa_number: '6281111111111', title: 'Oleh-Oleh Edukasi', description: 'Bawa pulang media tanam organik dan POC untuk dipraktikkan di rumah.', image: 'https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&q=80&w=600' },
    { id: 'oo-2', paket_id: 'Budaya', wa_number: '6282222222222', title: 'Oleh-Oleh Budaya', description: 'Kerajinan tangan otentik, kain lurik, dan camilan tradisional.', image: 'https://images.unsplash.com/photo-1605000797499-95a51c5269ae?auto=format&fit=crop&q=80&w=600' }
];

// ==============================================
// 3. FUNGSI DATABASE (CRUD)
// ==============================================
async function fetchHero() { 
    const { data, error } = await supabase.from('hero').select('*').eq('id', 1).limit(1); 
    if (error) console.error("Error Hero:", error); 
    return (data && data.length > 0) ? data[0] : fallbackHero; 
}
async function fetchPaket() { const { data, error } = await supabase.from('paket').select('*').order('id', { ascending: true }); if (error) console.error("Error Paket:", error); return data || []; }
async function fetchEdukasi() { const { data, error } = await supabase.from('edukasi').select('*').order('id', { ascending: true }); if (error) console.error("Error Edukasi:", error); return data || []; }
async function fetchKemitraan() { const { data, error } = await supabase.from('kemitraan').select('*').order('id', { ascending: true }); if (error) console.error("Error Mitra:", error); return data || []; }
async function fetchGaleri() { const { data, error } = await supabase.from('galeri').select('*').order('id', { ascending: false }); if (error) console.error("Error Galeri:", error); return data ? data.map(i => i.image_url) : []; }
// FUNGSI BARU: Ambil Oleh-Oleh
async function fetchOlehOleh() { const { data, error } = await supabase.from('oleholeh').select('*').order('id', { ascending: true }); if (error) console.error("Error Oleh-Oleh:", error); return data || []; }

// ==============================================
// 4. IKON & HELPER UNTUK UI KAYA FITUR
// ==============================================
const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

// Pemetaan Ikon FontAwesome
const Leaf = ({ className }) => <i className={`fas fa-leaf ${className}`}></i>;
const CheckCircle2 = ({ className }) => <i className={`fas fa-check-circle ${className}`}></i>;
const ArrowRight = ({ className }) => <i className={`fas fa-arrow-right ${className}`}></i>;
const ChevronLeft = ({ className }) => <i className={`fas fa-chevron-left ${className}`}></i>;
const ChevronRight = ({ className }) => <i className={`fas fa-chevron-right ${className}`}></i>;
const Calendar = ({ className }) => <i className={`fas fa-calendar-alt ${className}`}></i>;
const MessageCircle = ({ className }) => <i className={`fab fa-whatsapp ${className}`}></i>;
const Building2 = ({ className }) => <i className={`fas fa-building ${className}`}></i>;
const Compass = ({ className }) => <i className={`fas fa-compass ${className}`}></i>;
const X = ({ className }) => <i className={`fas fa-times ${className}`}></i>;

// Komponen Slider Gambar
const ImageSlider = ({ images, heightClass = "h-64 md:h-72", priceOverlay }) => {
    const [currentIndex, setCurrentIndex] = useState(0);
    const validImages = Array.isArray(images) && images.length > 0 ? images : ['https://images.unsplash.com/photo-1542601906990-b4d3fb778b09'];

    useEffect(() => {
        if(validImages.length <= 1) return;
        const timer = setInterval(() => setCurrentIndex(prev => (prev === validImages.length - 1 ? 0 : prev + 1)), 3500);
        return () => clearInterval(timer);
    }, [validImages]);

    return (
        <div className={`relative ${heightClass} w-full overflow-hidden group rounded-t-3xl`}>
            {validImages.map((img, idx) => (
                <img key={idx} src={img} className={`absolute inset-0 w-full h-full object-cover object-center transition-opacity duration-700 ease-in-out ${idx === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`} />
            ))}
            <div className="absolute inset-0 bg-gradient-to-t from-stone-900/90 via-stone-900/20 to-transparent z-10"></div>
            
            {validImages.length > 1 && (
                <>
                    <button type="button" onClick={(e) => { e.stopPropagation(); setCurrentIndex(prev => prev === 0 ? validImages.length - 1 : prev - 1); }} className="absolute left-2 top-1/2 -translate-y-1/2 z-20 bg-white/20 hover:bg-white/40 text-white p-2 rounded-full backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-all w-8 h-8 flex items-center justify-center"><ChevronLeft /></button>
                    <button type="button" onClick={(e) => { e.stopPropagation(); setCurrentIndex(prev => prev === validImages.length - 1 ? 0 : prev + 1); }} className="absolute right-2 top-1/2 -translate-y-1/2 z-20 bg-white/20 hover:bg-white/40 text-white p-2 rounded-full backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-all w-8 h-8 flex items-center justify-center"><ChevronRight /></button>
                    <div className="absolute bottom-4 left-0 right-0 z-20 flex justify-center gap-1.5">
                        {validImages.map((_, idx) => (<div key={idx} className={`h-1.5 rounded-full transition-all ${idx === currentIndex ? 'bg-amber-400 w-4' : 'bg-white/50 w-1.5'}`}></div>))}
                    </div>
                </>
            )}

            {priceOverlay && (
                <div className="absolute top-4 left-4 z-20">
                    <span className="bg-amber-500 text-stone-900 font-bold px-3 py-1.5 rounded-lg text-sm shadow-md">
                        {priceOverlay} <span className="text-xs font-medium">/ pax</span>
                    </span>
                </div>
            )}
        </div>
    );
};

// ==============================================
// 5. KOMPONEN WEBSITE PUBLIK (RICH UI)
// ==============================================
function PublicWebsite({ data, setGlobalRoute }) {
    const [view, setView] = useState('home');
    const [isMenuOpen, setIsMenuOpen] = useState(false);

    const hero = Object.keys(data?.hero || {}).length > 0 ? data.hero : fallbackHero;
    const paket = data?.paket || [];
    const edukasi = data?.edukasi || [];
    const kemitraan = data?.kemitraan || [];
    const galeri = data?.galeri || [];
    const olehOleh = data?.olehOleh?.length > 0 ? data.olehOleh : olehOlehDataStatic;

    const navLinks = [
        { id: 'home', label: 'Beranda' },
        { id: 'edukasi', label: 'Materi Edukasi' },
        { id: 'paket', label: 'Paket Wisata' },
        { id: 'galeri', label: 'Galeri' },
        { id: 'mitra', label: 'Kemitraan' },
    ];

    const changeView = (v) => { setView(v); setIsMenuOpen(false); window.scrollTo(0,0); };

    // --- HALAMAN BERANDA ---
    const HomeView = () => (
        <div className="animate-in fade-in duration-500">
            <section className="relative bg-emerald-900 h-[600px] flex items-center">
                <div className="absolute inset-0 z-0">
                    <img src={hero.image} className="w-full h-full object-cover object-center opacity-40 mix-blend-overlay" />
                    <div className="absolute inset-0 bg-gradient-to-t from-stone-900/80 via-stone-900/20 to-transparent"></div>
                </div>
                <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-left pt-20">
                    <span className="inline-block py-1 px-3 rounded-full bg-amber-500/20 text-amber-300 font-semibold text-sm mb-4 border border-amber-500/30 backdrop-blur-sm">{hero.tagline}</span>
                    <h1 className="text-4xl md:text-6xl font-extrabold text-white leading-tight mb-6 max-w-3xl">{hero.title_main || hero.titleMain} <span className="text-amber-400">{hero.title_highlight || hero.titleHighlight}</span></h1>
                    <p className="text-lg md:text-xl text-emerald-50 mb-8 max-w-2xl font-light">{hero.description}</p>
                    <button type="button" onClick={() => changeView('paket')} className="bg-amber-600 hover:bg-amber-500 text-white px-8 py-4 rounded-full font-bold text-lg transition-transform hover:-translate-y-1 shadow-lg flex items-center justify-center gap-2 mx-auto md:mx-0">Pilih Paket & Booking <ArrowRight className="text-base" /></button>
                </div>
            </section>

            <section className="py-20 bg-stone-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <h2 className="text-3xl font-bold text-stone-800 mb-4">Materi Edukasi Kami</h2>
                        <div className="w-24 h-1.5 bg-emerald-600 mx-auto rounded-full mb-6"></div>
                    </div>
                    {edukasi.length === 0 ? (
                        <div className="text-center text-stone-500">Belum ada materi edukasi ditambahkan.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {edukasi.slice(0, 3).map((item, index) => (
                                <div key={index} className="bg-white rounded-2xl p-6 shadow-sm border border-stone-100 hover:shadow-md transition-shadow group">
                                    <div className="bg-emerald-50 text-emerald-600 w-16 h-16 rounded-xl flex items-center justify-center mb-6 text-2xl group-hover:scale-110 transition-transform"><Leaf /></div>
                                    <h3 className="text-xl font-bold text-stone-800 mb-3">{item.title}</h3>
                                    <p className="text-stone-600 text-sm mb-4 line-clamp-3">{item.desc || item.description}</p>
                                </div>
                            ))}
                        </div>
                    )}
                    {edukasi.length > 0 && (
                        <div className="text-center mt-10">
                            <button type="button" onClick={() => changeView('edukasi')} className="text-emerald-600 font-bold hover:text-emerald-700 underline underline-offset-4">Pelajari Selengkapnya</button>
                        </div>
                    )}
                </div>
            </section>

            {kemitraan.length > 0 && (
                <section className="py-16 bg-white border-t border-stone-100">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <p className="text-sm font-bold text-stone-400 uppercase tracking-widest mb-8">Telah Dipercaya & Dikunjungi Oleh</p>
                        <div className="flex flex-wrap justify-center items-center gap-4 md:gap-6 opacity-90 hover:opacity-100 transition-all duration-500">
                            {kemitraan.slice(0, 4).map((mitra, idx) => (
                                <div key={idx} className="flex items-center gap-3 bg-white px-5 py-2.5 rounded-full border border-stone-200 shadow-sm hover:shadow-md transition-shadow">
                                    <img src={mitra.logo} alt={mitra.name} className="w-8 h-8 rounded-full object-contain bg-white" />
                                    <span className="font-bold text-stone-700 text-sm">{mitra.name}</span>
                                </div>
                            ))}
                            <button type="button" onClick={() => changeView('mitra')} className="text-sm font-bold text-emerald-600 hover:text-emerald-700 underline underline-offset-4 ml-2">Lihat Semua Mitra</button>
                        </div>
                    </div>
                </section>
            )}
        </div>
    );

    // --- HALAMAN EDUKASI ---
    const EducationView = () => (
        <div className="animate-in fade-in py-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="mb-12 text-center md:text-left">
                    <h1 className="text-4xl font-bold text-stone-800 mb-4">Materi Edukasi</h1>
                    <p className="text-stone-600 text-lg max-w-3xl">Pusat pembelajaran berbasis data nyata dari praktik keseharian warga.</p>
                </div>
                {edukasi.length === 0 ? (
                    <div className="text-center py-20 text-stone-500 bg-white rounded-2xl border border-dashed border-stone-300">Belum ada materi edukasi tersedia.</div>
                ) : (
                    <div className="space-y-16">
                        {edukasi.map((data, index) => {
                            const detailsList = Array.isArray(data.details) ? data.details : [];
                            return (
                                <div key={index} className={`flex flex-col lg:flex-row gap-8 items-center ${index % 2 !== 0 ? 'lg:flex-row-reverse' : ''}`}>
                                    <div className="w-full lg:w-1/2">
                                        <div className="relative rounded-3xl overflow-hidden shadow-lg group">
                                            <img src={data.image || 'https://images.unsplash.com/photo-1628189872167-27b0eb38e3e4'} className="w-full h-64 sm:h-[300px] md:h-[400px] object-cover object-center group-hover:scale-105 transition-transform duration-700" />
                                        </div>
                                    </div>
                                    <div className="w-full lg:w-1/2 space-y-6">
                                        <div>
                                            <h2 className="text-3xl font-bold text-emerald-800 mb-3">{data.title}</h2>
                                            <p className="text-stone-600 text-lg">{data.desc || data.description}</p>
                                        </div>
                                        {detailsList.length > 0 && (
                                            <div className="bg-white rounded-2xl p-6 border border-emerald-100 shadow-sm">
                                                <ul className="space-y-4">
                                                    {detailsList.map((detail, i) => (
                                                        <li key={i} className="flex gap-4">
                                                            <div className="w-1/3 font-semibold text-emerald-700 flex items-start gap-2"><CheckCircle2 className="text-amber-500 mt-1" />{detail.label}</div>
                                                            <div className="w-2/3 text-stone-700 break-words">{detail.value}</div>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        </div>
    );

    // --- HALAMAN PAKET & OLEH-OLEH ---
    const PackagesView = () => {
        const [bookingFormPkg, setBookingFormPkg] = useState(null); 
        const [formData, setFormData] = useState({ nama: '', asal: '', jumlah: '', tanggal: '', catatan: '' });
        
        const adminWAPaket = "6285643545567";

        const handleBookingSubmit = (e) => {
            e.preventDefault();
            const text = `Halo Admin Kampung Berseri 👋\n\nSaya ingin booking paket wisata:\n\n📦 Paket: ${bookingFormPkg.name}\n👤 Nama: ${formData.nama}\n🏙️ Asal: ${formData.asal}\n👥 Jumlah Peserta: ${formData.jumlah} Orang\n📅 Tanggal Kunjungan: ${formData.tanggal}\n📝 Catatan: ${formData.catatan || '-'}\n\nMohon info detail dan total biayanya ya. Terima kasih 🙏`;
            window.open(`https://wa.me/${adminWAPaket}?text=${encodeURIComponent(text)}`, '_blank');
            setBookingFormPkg(null);
            setFormData({ nama: '', asal: '', jumlah: '', tanggal: '', catatan: '' });
        };

        return (
            <div className="bg-stone-50 min-h-screen animate-in fade-in relative">
                <div className="py-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <span className="text-amber-600 font-bold uppercase tracking-wider text-sm">Reservasi Cepat & Mudah</span>
                        <h1 className="text-4xl md:text-5xl font-extrabold text-stone-800 mt-2 mb-4">Pilih Paket Wisata Anda</h1>
                        <p className="text-stone-600 max-w-2xl mx-auto text-lg">Eksplorasi pilihan kegiatan kami. Sistem akan langsung menghubungkan Anda ke WhatsApp Admin.</p>
                    </div>

                    {paket.length === 0 ? (
                        <div className="text-center py-20 text-stone-500 bg-white rounded-2xl border border-dashed border-stone-300">Belum ada paket wisata ditambahkan.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-10">
                            {paket.map((pkg, index) => {
                                const activities = pkg.activities || ['Eksplorasi desa', 'Materi edukasi', 'Ramah tamah'];
                                const images = Array.isArray(pkg.images) && pkg.images.length > 0 ? pkg.images : [pkg.image || 'https://images.unsplash.com/photo-1542601906990-b4d3fb778b09'];
                                
                                return (
                                    <div key={index} className="bg-white rounded-3xl shadow-sm hover:shadow-xl transition-all border border-stone-200 flex flex-col h-full relative group">
                                        <ImageSlider images={images} heightClass="h-64" priceOverlay={formatRupiah(pkg.price)} />
                                        <div className="p-8 flex-grow flex flex-col">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="p-2 bg-emerald-50 text-emerald-600 rounded-lg text-xl"><Compass /></div>
                                                <h3 className="text-2xl font-bold text-stone-800">{pkg.name}</h3>
                                            </div>
                                            <p className="text-stone-600 mb-6 leading-relaxed flex-grow">{pkg.desc || pkg.description}</p>
                                            <div className="space-y-4 mb-8">
                                                <div className="flex items-center gap-2 text-stone-800 font-bold border-b border-stone-100 pb-2">
                                                    <Calendar className="text-emerald-600" /> {pkg.duration || 'Bervariasi'}
                                                </div>
                                                <ul className="space-y-2">
                                                    {activities.map((act, i) => (
                                                        <li key={i} className="text-stone-600 text-sm flex items-start gap-2 break-words">
                                                            <CheckCircle2 className="text-emerald-500 mt-1 flex-shrink-0" /><span>{act}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="mt-auto">
                                                <button type="button" onClick={() => setBookingFormPkg(pkg)} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-transform shadow-lg flex items-center justify-center gap-2 group-hover:-translate-y-1">
                                                    Pilih Paket & Booking Sekarang <ArrowRight />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>

                {/* Bagian Oleh-oleh / Suvenir */}
                <div className="bg-stone-900 py-20 relative overflow-hidden">
                    <div className="absolute inset-0 opacity-5 pointer-events-none"><Leaf className="text-white text-[500px] transform -translate-x-1/4 -translate-y-1/4" /></div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-white mb-4">Lengkapi Kunjungan dengan Oleh-Oleh</h2>
                            <p className="text-stone-400 max-w-2xl mx-auto text-lg">Dukung pemberdayaan warga lokal. Pilih suvenir khas Kampung Berseri.</p>
                        </div>
                        {olehOleh.length === 0 ? (
                            <div className="text-center py-10 text-stone-500 border border-dashed border-stone-700 rounded-2xl">Belum ada daftar suvenir yang tersedia.</div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 justify-center">
                                {olehOleh.map((oo, idx) => (
                                    <div key={oo.id || idx} className="bg-stone-800 border border-stone-700 rounded-2xl overflow-hidden flex flex-col hover:border-amber-500 transition-colors group">
                                        <div className="h-40 overflow-hidden relative">
                                            <img src={oo.image} loading="lazy" className="w-full h-full object-cover object-center group-hover:scale-110 transition-transform duration-500 opacity-80 group-hover:opacity-100" />
                                            {oo.paket_id && (
                                                <div className="absolute bottom-2 left-2 bg-stone-900/80 backdrop-blur-md px-3 py-1 rounded-lg text-white font-bold text-sm border border-stone-700">{oo.paket_id}</div>
                                            )}
                                        </div>
                                        <div className="p-6 flex flex-col flex-grow">
                                            <h4 className="font-bold text-white mb-2">{oo.title}</h4>
                                            <p className="text-stone-400 text-sm mb-6 flex-grow">{oo.description || oo.desc}</p>
                                            <button type="button" onClick={() => window.open(`https://wa.me/${oo.wa_number || oo.waNumber}?text=Halo saya tertarik dengan produk suvenir/oleh-oleh: ${oo.title}`, '_blank')} className="w-full bg-green-500 hover:bg-green-400 text-stone-950 font-bold py-3 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2 text-sm">
                                                <MessageCircle /> Pesan via WA
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>

                {/* Modal Form Booking */}
                {bookingFormPkg && (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/80 backdrop-blur-sm animate-in fade-in">
                        <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl relative overflow-hidden">

function LoginAdmin({ setGlobalRoute }) {
    const [user, setUser] = useState('');
    const [pass, setPass] = useState('');
    const [status, setStatus] = useState({ type: '', msg: '' });
    const [loading, setLoading] = useState(false);

    useEffect(() => {
        if (localStorage.getItem('admin_logged_in') === 'true') {
            setGlobalRoute('admin');
        }
    }, [setGlobalRoute]);

    const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setStatus({ type: '', msg: '' });

        try {
            const { data, error } = await supabase.from('admin_users').select('*').eq('username', user).limit(1);
            const adminData = data && data.length > 0 ? data[0] : null;
            
            if (error || !adminData) {
                if (user === 'admin' && pass === 'admin123') {
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_username', user);
                    setStatus({ type: 'success', msg: 'Login berhasil (Demo Mode)!' });
                    setTimeout(() => setGlobalRoute('admin'), 1000);
                } else {
                    setStatus({ type: 'error', msg: 'Username / Password salah!' });
                }
            } else if (adminData.password === pass) {
                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_username', user);
                setStatus({ type: 'success', msg: 'Login berhasil!' });
                setTimeout(() => setGlobalRoute('admin'), 1000);
            } else {
                setStatus({ type: 'error', msg: 'Password salah!' });
            }
        } catch (err) {
            setStatus({ type: 'error', msg: 'Terjadi kesalahan sistem.' });
            console.error("Login Error:", err);
        }
        setLoading(false);
    };

    return (
        <div className="min-h-screen bg-gradient-to-br from-emerald-900 via-emerald-800 to-stone-900 flex flex-col items-center justify-center p-4 relative">
            <button type="button" onClick={() => setGlobalRoute('public')} className="absolute top-6 left-6 text-white hover:text-emerald-200 flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full backdrop-blur-md transition">
                <i className="fas fa-arrow-left"></i> Kembali ke Web
            </button>

            <div className="max-w-md w-full bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden fade-in mt-16 md:mt-0">
                <div className="bg-emerald-600 p-6 text-center">
                    <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3"><i className="fas fa-leaf text-white text-3xl"></i></div>
                    <h2 className="text-2xl font-bold text-white">Admin Dashboard</h2>
                </div>
                <div className="p-8">
                    {status.msg && (
                        <div className={`mb-4 p-3 rounded-xl text-sm flex items-center gap-2 ${status.type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'}`}>
                            <i className={`fas ${status.type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}`}></i> {status.msg}
                        </div>
                    )}
                    <form onSubmit={handleLogin} className="space-y-5">
                        <div>
                            <label className="block text-sm font-bold text-stone-700 mb-2"><i className="fas fa-user text-emerald-600 mr-2"></i> Username</label>
                            <input type="text" required value={user} onChange={(e)=>setUser(e.target.value)} className="w-full border border-stone-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="admin" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-stone-700 mb-2"><i className="fas fa-lock text-emerald-600 mr-2"></i> Password</label>
                            <input type="password" required value={pass} onChange={(e)=>setPass(e.target.value)} className="w-full border border-stone-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="admin123" />
                        </div>
                        <button type="submit" disabled={loading} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-md flex justify-center items-center gap-2 mt-6">
                            {loading ? <i className="fas fa-spinner fa-spin"></i> : <><i className="fas fa-sign-in-alt"></i> Masuk ke Dashboard</>}
                        </button>
                    </form>
                    <div className="mt-6 pt-4 border-t border-stone-200 text-center text-xs text-stone-500">
                        Demo Login: <strong>admin</strong> / <strong>admin123</strong>
                    </div>
                </div>
            </div>
        </div>
    );
}

function ManagePaket({ data, onSave, showToast }) {
    const [items, setItems] = useState([]);
    
    useEffect(() => { 
        setItems((data || []).map(item => ({
            ...item,
            rawActivities: Array.isArray(item.activities) ? item.activities.join('\n') : ''
        }))); 
    }, [data]);

    const updateItem = (id, field, value) => setItems(items.map(i => i.id === id ? {...i, [field]: value} : i));
    const addNew = () => setItems([...items, { id: 'new-' + Date.now(), name: 'Paket Baru', price: 0, duration: '1 Hari', desc: '', activities: [], images: [], rawActivities: '' }]);
    const deleteItem = (id) => { if (confirm('Yakin ingin menghapus paket wisata ini?')) setItems(items.filter(i => i.id !== id)); };
    
    return (
        <div className="bg-white p-4 md:p-8 rounded-3xl shadow-xl border border-stone-100 fade-in w-full overflow-x-hidden">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 className="text-2xl md:text-3xl font-extrabold text-stone-800">Kelola Paket Wisata</h2>
                    <p className="text-stone-500 mt-1 text-sm md:text-base">Tambahkan, ubah, atau hapus pilihan paket wisata untuk pengunjung.</p>
                </div>
                <button type="button" onClick={addNew} className="w-full md:w-auto bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-emerald-700 transition shadow-sm flex items-center justify-center gap-2"><i className="fas fa-plus"></i> Tambah Paket Baru</button>
            </div>
            <div className="space-y-8">
                {items.length === 0 && <div className="text-center py-12 bg-stone-50 rounded-2xl border-2 border-dashed border-stone-300 text-stone-500 font-medium">Belum ada paket wisata. Klik tombol "Tambah Paket Baru" untuk memulai.</div>}
                
                {items.map((item, index) => (
                    <div key={item.id} className="bg-white rounded-2xl p-4 md:p-6 border border-stone-200 relative shadow-lg hover:shadow-xl hover:border-emerald-400 transition-all duration-300 mt-6">
                        <div className="absolute -top-4 left-4 bg-emerald-600 text-white px-5 py-1.5 rounded-full text-xs md:text-sm font-bold shadow-md">Paket {index + 1}</div>
                        <button type="button" onClick={() => deleteItem(item.id)} className="absolute top-4 right-4 text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 md:p-2.5 rounded-xl transition" title="Hapus Paket"><i className="fas fa-trash"></i></button>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6 mt-6 md:mt-4">
                            <div><label className="block text-sm font-bold text-stone-700 mb-2">Nama Paket</label><input value={item.name || ''} onChange={e => updateItem(item.id, 'name', e.target.value)} className="w-full border border-stone-300 rounded-xl p-3 focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow" placeholder="Contoh: Paket Edukasi" /></div>
                            <div><label className="block text-sm font-bold text-stone-700 mb-2">Harga (Angka saja)</label><input type="number" value={item.price || 0} onChange={e => updateItem(item.id, 'price', parseInt(e.target.value) || 0)} className="w-full border border-stone-300 rounded-xl p-3 focus:ring-2 focus:ring-emerald-500 outline-none transition-shadow" placeholder="Contoh: 75000" /></div>

                                <label className="block text-sm font-bold text-stone-700 mb-1">Daftar Aktivitas</label>
                                <p className="text-xs text-stone-500 mb-3"><i className="fas fa-keyboard text-emerald-500 mr-1"></i> Pisahkan kegiatan dengan <strong>Enter</strong>.</p>
                                <textarea value={item.rawActivities ?? ''} onChange={e => updateItem(item.id, 'rawActivities', e.target.value)} className="w-full border border-stone-300 rounded-xl p-3 focus:ring-2 focus:ring-emerald-500 outline-none leading-relaxed bg-white transition-shadow" rows="4" placeholder="Keliling Desa Berseri&#10;Belajar Membuat Pupuk&#10;Makan Siang Bersama"></textarea>
                            </div>
                            <div className="bg-stone-50 p-4 md:p-5 rounded-2xl border border-stone-200">
                                <label className="block text-sm font-bold text-stone-700 mb-1">Foto Paket Wisata (Maks 2MB/foto)</label>

                                <div className="flex flex-wrap gap-3">
                                    {(item.images || []).map((img, i) => (
                                        <div key={i} className="relative w-16 h-16 md:w-20 md:h-20 rounded-xl overflow-hidden border-2 border-stone-200 shadow-sm group">
                                            <img src={img} className="w-full h-full object-cover object-center" />
                                            <button type="button" onClick={() => updateItem(item.id, 'images', item.images.filter((_, idx) => idx !== i))} className="absolute inset-0 bg-red-600/70 text-white opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all"><i className="fas fa-trash text-sm md:text-lg"></i></button>

                                    ))}
                                    <label className="w-16 h-16 md:w-20 md:h-20 rounded-xl border-2 border-dashed border-emerald-300 bg-white text-emerald-600 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-50 hover:border-emerald-400 transition-all shadow-sm">
                                        <i className="fas fa-plus text-base md:text-lg mb-1"></i>
                                        <span className="text-[10px] font-bold">Upload</span>
                                        <input type="file" accept="image/png, image/jpeg, image/jpg" className="hidden" onChange={(e) => {
                                            handleImageUpload(e, (base64) => {
                                                const newImages = [...(item.images || []), base64];
                                                updateItem(item.id, 'images', newImages);
                                            }, showToast);
                                        }} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                ))}
            </div>
            
            <div className="mt-10 p-5 bg-amber-50 rounded-2xl border border-amber-200 flex items-start gap-4 shadow-sm">
                <div className="w-10 h-10 bg-amber-100 rounded-full flex justify-center items-center flex-shrink-0 text-amber-500 text-xl hidden sm:flex"><i className="fas fa-info-circle"></i></div>

            <button type="button" onClick={(e) => { e.preventDefault(); onSave('paket', items); }} className="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-4 rounded-2xl transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 text-base md:text-lg flex justify-center items-center gap-3"><i className="fas fa-save text-xl md:text-2xl"></i> SIMPAN SEMUA PERUBAHAN PAKET</button>
        </div>
    );
}

function ManageEdukasi({ data, onSave, showToast }) {
    const [items, setItems] = useState([]);
    
    useEffect(() => { 
        setItems((data || []).map(item => ({
            ...item,
            rawDetails: Array.isArray(item.details) ? item.details.map(d => `${d.label}: ${d.value}`).join('\n') : ''
        })));

function AdminDashboard({ setGlobalRoute, data, refreshData }) {
    const [menu, setMenu] = useState('overview');
    const [toast, setToast] = useState(null);
    const [isSaving, setIsSaving] = useState(false);
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false); // Mobile sidebar control

    // Proteksi Route Admin agar tidak sembarangan diakses
    useEffect(() => {
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            setGlobalRoute('login');
        }
    }, [setGlobalRoute]);
    
    const hero = data?.hero || fallbackHero;
    const paket = data?.paket || [];
    const edukasi = data?.edukasi || [];
    const kemitraan = data?.kemitraan || [];
    const galeri = data?.galeri || [];
    const olehOleh = data?.olehOleh || [];

    // State Lokal Khusus Preview Gambar Hero
    const [previewHeroImg, setPreviewHeroImg] = useState('');
    useEffect(() => {
        setPreviewHeroImg(hero.image || '');
    }, [hero.image]);

    const showToast = (msg, type='success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 4000);
    };

    const handleLogout = () => {
        localStorage.removeItem('admin_logged_in');
        localStorage.removeItem('admin_username');
        setGlobalRoute('login');
    };

    // FUNGSI UNTUK MENYIMPAN HERO
    const wrapSave = async (apiCall, section) => {
        if(isSaving) return;
        setIsSaving(true);
        try {
            await apiCall();
            showToast(`Data ${section} berhasil diperbarui!`);
            await refreshData(); // Sinkronkan ulang datanya dari database
        } catch (err) {
            showToast(`Gagal: ${err.message}`, 'error');
        } finally {
            setIsSaving(false);
        }
    };

    // FUNGSI UNTUK MENYIMPAN ARRAY / LIST (Wipe & Insert Aman)
    const handleSaveList = async (table, items) => {
        if(isSaving) return;
        setIsSaving(true);
        try {
            // Hapus semua data lama agar disinkronkan total dengan list terbaru.
            await supabase.from(table).delete().neq('id', 0);
            
            if (items.length > 0) {
                let payload;
                if (table === 'galeri') {
                    payload = items.map(img => ({ image_url: img }));
                } else {
                    payload = items.map(item => {
                        // 1. Cabut id agar Supabase yang otomatis membuat ID barunya
                        const { id, rawActivities, rawDetails, ...copy } = item;
                        
                        // 2. Samakan field nama
                        if (copy.desc !== undefined) {
                            copy.description = copy.desc;
                            delete copy.desc;
                        }

                        // 3. Olah kembali string mentah (raw text) menjadi Array / Json sesuai format Database Anda
                        if (table === 'paket') {
                            copy.activities = (rawActivities || '').split('\n').map(s => s.trim()).filter(Boolean);
                        }
                        if (table === 'edukasi') {
                            copy.details = (rawDetails || '').split('\n').filter(l => l.includes(':')).map(l => {
                                const [label, ...rest] = l.split(':');
                                return { label: label.trim(), value: rest.join(':').trim() };
                            });
                        }
                        
                        return copy;
                    });
                }
                
                const { error } = await supabase.from(table).insert(payload);
                if (error) {
                    if (error.code === '42501') throw new Error(`Akses Ditolak (RLS Aktif). Jalankan SQL ini di Supabase: ALTER TABLE ${table} DISABLE ROW LEVEL SECURITY;`);
                    throw error;
                }
            }
            
            showToast(`Data ${table} berhasil disimpan!`);
            // Tarik ulang data ke web agar benar-benar sinkron
            await refreshData(); 
        } catch (err) {
            showToast(`Gagal menyimpan ${table}: ` + err.message, 'error');
            console.error(err);
        } finally {
            setIsSaving(false);
        }
    };

    return (
        <div className="flex h-screen bg-stone-100 fade-in overflow-hidden relative">
            {toast && (
                <div className={`fixed top-4 right-4 z-[9999] px-6 py-4 rounded-xl text-white font-bold shadow-2xl transition-all flex items-center gap-3 ${toast.type === 'error' ? 'bg-red-500' : 'bg-emerald-600'}`}>
                    <i className={`fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} text-2xl`}></i>
                    {toast.msg}
                </div>
            )}
            {isSaving && (
                <div className="fixed inset-0 z-[9998] bg-stone-900/50 backdrop-blur-sm flex flex-col items-center justify-center text-white font-bold">
                    <i className="fas fa-spinner fa-spin text-5xl mb-4"></i> Menyimpan Perubahan...
                </div>
            )}
            
            {/* Sidebar Overlay for Mobile */}
            {isMobileMenuOpen && (
                <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>
            )}

            {/* Sidebar */}
            <div className={`w-64 bg-stone-900 text-stone-300 flex flex-col fixed md:static inset-y-0 left-0 z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 ease-in-out`}>
                <div className="p-6 border-b border-stone-800 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <i className="fas fa-leaf text-emerald-500 text-2xl"></i>
                        <div><h1 className="font-bold text-white">Admin CMS</h1><p className="text-xs text-emerald-500">Kampung Berseri</p></div>
                    </div>
                    <button className="md:hidden text-white" onClick={() => setIsMobileMenuOpen(false)}><i className="fas fa-times text-xl"></i></button>
                </div>
                
                <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                    {[
                        { id: 'overview', icon: 'chart-pie', label: 'Ringkasan' },
                        { id: 'hero', icon: 'home', label: 'Tampilan Beranda' },
                        { id: 'paket', icon: 'box', label: 'Paket Wisata' },
                        { id: 'edukasi', icon: 'book-open', label: 'Edukasi' },
                        { id: 'oleholeh', icon: 'gift', label: 'Oleh-Oleh' }, // Menu Baru Oleh-Oleh
                        { id: 'kemitraan', icon: 'building', label: 'Mitra' },
                        { id: 'galeri', icon: 'images', label: 'Galeri' }
                    ].map(btn => (
                        <button type="button" key={btn.id} onClick={() => { setMenu(btn.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${menu === btn.id ? 'bg-emerald-600 text-white shadow-md' : 'hover:bg-stone-800'}`}>
                            <div className="w-5 text-center"><i className={`fas fa-${btn.icon}`}></i></div> {btn.label}
                        </button>
                    ))}
                </nav>
                
                <div className="p-4 border-t border-stone-800 space-y-2">
                    <button type="button" onClick={() => setGlobalRoute('public')} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-stone-800 transition text-stone-400">
                        <i className="fas fa-external-link-alt w-5"></i> Lihat Website
                    </button>
                    <button type="button" onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-400 hover:bg-stone-800 transition">
                        <i className="fas fa-sign-out-alt w-5"></i> Logout
                    </button>
                </div>
            </div>
            
            {/* Main Content Area */}
            <div className="flex-1 flex flex-col h-full overflow-hidden w-full">
                {/* Mobile Header */}
                <div className="md:hidden bg-white shadow-sm px-4 py-3 flex justify-between items-center z-30">
                    <div className="font-bold text-stone-800 flex items-center gap-2"><i className="fas fa-leaf text-emerald-600"></i> Admin Panel</div>
                    <button onClick={() => setIsMobileMenuOpen(true)} className="text-stone-800 p-2"><i className="fas fa-bars text-xl"></i></button>
                </div>

                <div className="flex-1 overflow-auto p-4 md:p-8 w-full">
                    {menu === 'overview' && (
                        <div className="fade-in">
                            <div className="bg-gradient-to-r from-emerald-600 to-emerald-700 rounded-3xl p-6 md:p-10 text-white mb-8 shadow-xl border border-emerald-500/30">
                                <h2 className="text-2xl md:text-3xl font-bold mb-2">Selamat Datang, Admin!</h2>
                                <p className="text-emerald-100 text-sm md:text-base">Kelola konten website Kampung Berseri. Perubahan akan langsung tersimpan.</p>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                                {[
                                    { title: 'Paket', count: paket.length, icon: 'box', color: 'emerald' },
                                    { title: 'Edukasi', count: edukasi.length, icon: 'book-open', color: 'blue' },
                                    { title: 'Mitra', count: kemitraan.length, icon: 'building', color: 'amber' },
                                    { title: 'Galeri', count: galeri.length, icon: 'images', color: 'purple' }
                                ].map((stat, i) => (
                                    <div key={i} className={`bg-white p-4 md:p-6 rounded-2xl shadow-lg hover:shadow-xl transition-shadow border border-stone-100 border-b-4 border-b-${stat.color}-500 flex flex-col items-center md:items-start text-center md:text-left`}>
                                        <i className={`fas fa-${stat.icon} text-${stat.color}-200 text-3xl md:text-4xl mb-3`}></i>
                                        <p className="text-2xl md:text-3xl font-extrabold text-stone-800">{stat.count}</p>
                                        <p className="text-xs md:text-sm font-bold text-stone-500 uppercase tracking-wide">{stat.title}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {menu === 'hero' && (
                        <div className="bg-white p-4 md:p-8 rounded-3xl shadow-xl border border-stone-100 fade-in w-full max-w-4xl mx-auto overflow-hidden">
                            <div className="mb-6 md:mb-8">
                                <h2 className="text-2xl md:text-3xl font-extrabold text-stone-800">Pengaturan Halaman Utama</h2>
                                <p className="text-stone-500 mt-1 text-sm md:text-base">Ini adalah teks sambutan besar yang pertama kali dilihat pengunjung saat membuka website Anda.</p>
                            </div>
                            
                            <div className="space-y-6 bg-stone-50 p-4 md:p-8 rounded-2xl border border-stone-200 shadow-inner">
                                <div>
                                    <label className="block text-sm font-bold text-stone-700 mb-2">Tagline (Teks kecil di atas judul)</label>
                                    <input className="w-full border border-stone-300 p-3 md:p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm md:text-md font-medium transition-shadow" defaultValue={hero.tagline} placeholder="Contoh: Destinasi Wisata Ramah Lingkungan" id="h-tagline" />
                                </div>

                                <div>
                                    <label className="block text-sm font-bold text-stone-700 mb-2">Judul Utama Website (Teks Putih)</label>
                                    <input className="w-full border border-stone-300 p-3 md:p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-base md:text-lg font-bold transition-shadow" defaultValue={hero.title_main || hero.titleMain} placeholder="Contoh: Wisata Edukasi" id="h-title" />
                                </div>

                                <div>
                                    <label className="block text-sm font-bold text-stone-700 mb-2">Kata Kunci Judul (Teks Kuning/Highlight)</label>
                                    <input className="w-full border border-stone-300 p-3 md:p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-base md:text-lg font-bold text-amber-600 transition-shadow" defaultValue={hero.title_highlight || hero.titleHighlight} placeholder="Contoh: Kampung Berseri" id="h-title-highlight" />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-bold text-stone-700 mb-2">Deskripsi / Kalimat Sambutan</label>
                                    <textarea className="w-full border border-stone-300 p-3 md:p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-stone-700 text-sm md:text-base transition-shadow" rows="4" defaultValue={hero.description} placeholder="Ceritakan singkat tentang tempat wisata Anda..." id="h-desc" />
                                </div>

                                {/* FITUR UNGGAH FOTO BERANDA LOKAL */}
                                <div className="pt-6 border-t border-stone-200">
                                    <label className="block text-sm font-bold text-stone-700 mb-3">Ganti Foto Latar Belakang (Gambar Besar)</label>
                                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 md:gap-5 bg-white p-5 rounded-2xl border border-stone-200 shadow-md hover:shadow-lg transition-shadow duration-300">
                                        <div className="w-full sm:w-32 h-32 sm:h-20 rounded-xl overflow-hidden bg-stone-100 flex-shrink-0 border-2 border-stone-200 shadow-inner relative group">
                                            {previewHeroImg ? (
                                                <>
                                                    {/* Menggunakan object-cover dan object-center untuk foto pemandangan agar selalu fit dan proporsional */}
                                                    <img src={previewHeroImg} className="w-full h-full object-cover object-center" alt="Pratinjau Beranda" />
                                                    <button type="button" onClick={() => setPreviewHeroImg('')} className="absolute inset-0 bg-red-600/70 text-white opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all"><i className="fas fa-trash text-xl"></i></button>
                                                </>
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center"><i className="fas fa-image text-stone-300 text-3xl sm:text-2xl"></i></div>
                                            )}
                                        </div>
                                        <div className="flex-1 w-full">
                                            <input type="file" id="hero-img-upload" accept="image/jpeg, image/png, image/jpg" onChange={(e) => handleImageUpload(e, setPreviewHeroImg, showToast)} className="hidden" />
                                            <label htmlFor="hero-img-upload" className="inline-flex items-center justify-center bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold py-2.5 px-5 rounded-xl cursor-pointer transition w-full sm:w-auto text-center border border-emerald-200 shadow-sm text-sm md:text-base">
                                                <i className="fas fa-upload mr-2"></i> Pilih Foto Baru dari Perangkat
                                            </label>
                                            <p className="text-xs text-stone-500 mt-2 font-medium">Format: JPG, JPEG, PNG. Maksimal 2MB agar website tetap cepat.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mt-8 p-5 bg-emerald-50 rounded-2xl border border-emerald-200 flex items-start gap-4 shadow-sm">
                                <div className="w-10 h-10 bg-emerald-100 rounded-full flex justify-center items-center flex-shrink-0 text-emerald-600 text-xl hidden sm:flex"><i className="fas fa-check-circle"></i></div>
                                <div>
                                    <h4 className="font-bold text-emerald-800 text-base md:text-lg">Sudah Selesai?</h4>
                                    <p className="text-emerald-700 pt-0 sm:pt-1 font-medium text-sm md:text-base">Perubahan akan langsung terlihat di website publik setelah disimpan.</p>
                                </div>
                            </div>
                            
                            <button type="button" disabled={isSaving} onClick={(e) => {
                                e.preventDefault();
                                const newHero = {
                                    id: 1, 
                                    tagline: document.getElementById('h-tagline').value,
                                    title_main: document.getElementById('h-title').value, 
                                    title_highlight: document.getElementById('h-title-highlight').value,
                                    description: document.getElementById('h-desc').value,
                                    image: previewHeroImg // Simpan gambar hasil upload!
                                };
                                wrapSave(async () => { 
                                    const { error } = await supabase.from('hero').upsert(newHero); 
                                    if (error) {
                                        if (error.code === '42501') throw new Error('Akses Ditolak (RLS Aktif). Jalankan SQL ini di Supabase: ALTER TABLE hero DISABLE ROW LEVEL SECURITY;');
                                        throw error;
                                    }
                                }, 'Halaman Utama');
                            }} className="w-full mt-6 bg-emerald-600 text-white px-6 py-4 rounded-2xl font-extrabold hover:bg-emerald-700 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 text-base md:text-lg flex justify-center items-center gap-3">
                                {isSaving ? <i className="fas fa-spinner fa-spin text-xl"></i> : <i className="fas fa-save text-xl md:text-2xl"></i>} SIMPAN TAMPILAN UTAMA
                            </button>
                        </div>
                    )}

                    {menu === 'paket' && <ManagePaket data={paket} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'edukasi' && <ManageEdukasi data={edukasi} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'oleholeh' && <ManageOlehOleh data={olehOleh} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'kemitraan' && <ManageKemitraan data={kemitraan} onSave={handleSaveList} showToast={showToast} />}
                    {menu === 'galeri' && <ManageGaleri data={galeri} onSave={handleSaveList} showToast={showToast} />}
                </div>
            </div>
        </div>
    );
}

// ==============================================
// 9. ROOT ROUTER (PENGENDALI UTAMA)
// ==============================================
function App() {
    const [globalRoute, setGlobalRoute] = useState('public');
    const [loading, setLoading] = useState(true);
    const [data, setData] = useState({ hero: {}, paket: [], edukasi: [], kemitraan: [], galeri: [], olehOleh: [] });

    const loadAllData = async () => {
        setLoading(true);
        try {
            const [hero, paket, edukasi, kemitraan, galeri, olehOleh] = await Promise.all([
                fetchHero(), fetchPaket(), fetchEdukasi(), fetchKemitraan(), fetchGaleri(), fetchOlehOleh()
            ]);
            setData({ hero, paket, edukasi, kemitraan, galeri, olehOleh });
        } catch (error) {
            console.error("Gagal memuat data dari Supabase:", error);
        } finally {
            setLoading(false);
        }
    };

    // Muat data HANYA saat aplikasi pertama kali dijalankan
    useEffect(() => {
        loadAllData();
    }, []);

    if (loading) return (
        <div className="min-h-screen bg-stone-50 flex flex-col items-center justify-center p-4">
            <div className="w-16 h-16 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mb-4 shadow-lg"></div>
            <p className="text-stone-600 font-bold text-center animate-pulse">Memuat data Kampung Berseri...</p>
        </div>
    );

    return (
        <React.Fragment>
            {globalRoute === 'public' && <PublicWebsite data={data} setGlobalRoute={setGlobalRoute} />}
            {globalRoute === 'login'  && <LoginAdmin setGlobalRoute={setGlobalRoute} />}
            {globalRoute === 'admin'  && <AdminDashboard data={data} setGlobalRoute={setGlobalRoute} refreshData={loadAllData} />}
        </React.Fragment>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
